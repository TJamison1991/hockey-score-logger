<!DOCTYPE html>
<html>
<head>
    <title>Hockey Score Logger</title>
</head>
<body>
    <h1>Hockey Score Logger</h1>
    <a href="/add">+ Add Game</a>

    <table border="1">
        <thead>
            <tr>
                <th>Actions</th>
                <th>Home Team</th>
                <th>Away Team</th>
                <th>Home Score</th>
                <th>Away Score</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for game in games %}
            <tr>
                <td><a href="/update/{{ game[0] }}">Update</a></td>
                <td>{{ game[1] }}</td>
                <td>{{ game[2] }}</td>
                <td>{{ game[3] }}</td>
                <td>{{ game[4] }}</td>
                <td>{{ game[5] }}</td>
                <td>{{ game[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
